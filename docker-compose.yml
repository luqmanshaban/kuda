services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: luqman
      POSTGRES_PASSWORD: Luqman123.
      POSTGRES_DB: kuda
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: kuda
      DB_USER: luqman
      DB_PASS: Luqman123.
    depends_on:
      - db

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app

volumes:
  postgres_data:
